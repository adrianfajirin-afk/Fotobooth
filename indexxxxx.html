<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>index.html</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:auto;padding:15px}
video,canvas,img{width:100%;border-radius:10px}
button{padding:10px;margin:5px}
.card{border:1px solid #ccc;border-radius:10px;padding:10px;margin-top:12px}
</style>
</head>
<body>
<h1>Virtual Guestbook Demo</h1>

<input id="nama" placeholder="Nama"><br><br>

<video id="video" autoplay playsinline></video><br>
<button id="startCam">Buka Kamera</button>
<button id="snap">📸 Jepret</button>

<canvas id="canvas" style="display:none"></canvas>

<hr>

<button id="startRec">🎤 Mulai Rekam</button>
<button id="stopRec">Stop Rekam</button>
<div id="status"></div>

<hr>

<button id="kirim">Kirim ke Feed</button>

<h2>Feed</h2>
<div id="feed"></div>

<script>
let photoData = null;
let recorder = null;
let audioBlob = null;

document.getElementById('startCam').onclick = async ()=>{
 try{
   const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user'},
      audio:false
   });
   document.getElementById('video').srcObject = stream;
 }catch(e){
   alert('Izin kamera ditolak atau browser tidak mendukung.');
 }
};

document.getElementById('snap').onclick = ()=>{
 const video = document.getElementById('video');
 const canvas = document.getElementById('canvas');
 canvas.width = video.videoWidth || 640;
 canvas.height = video.videoHeight || 480;
 const ctx = canvas.getContext('2d');
 ctx.drawImage(video,0,0);
 photoData = canvas.toDataURL('image/jpeg');
 alert('Foto berhasil diambil');
};

document.getElementById('startRec').onclick = async ()=>{
 try{
   const stream = await navigator.mediaDevices.getUserMedia({audio:true});
   recorder = new MediaRecorder(stream);
   let chunks=[];

   recorder.ondataavailable = e=>chunks.push(e.data);

   recorder.onstop = ()=>{
      audioBlob = new Blob(chunks,{type:'audio/webm'});
      document.getElementById('status').innerText='Voice note siap';
   };

   recorder.start();
   document.getElementById('status').innerText='Sedang merekam...';
 }catch(e){
   alert('Izin mikrofon ditolak.');
 }
};

document.getElementById('stopRec').onclick = ()=>{
 if(recorder) recorder.stop();
};

document.getElementById('kirim').onclick = ()=>{
 if(!photoData){
   alert('Ambil foto dulu');
   return;
 }

 const nama = document.getElementById('nama').value || 'Anonim';

 const card = document.createElement('div');
 card.className='card';

 let audioHTML='';
 if(audioBlob){
   const url = URL.createObjectURL(audioBlob);
   audioHTML = `<audio controls src="${url}"></audio>`;
 }

 card.innerHTML = `
   <h3>${nama}</h3>
   <img src="${photoData}">
   <br><br>
   ${audioHTML}
 `;

 document.getElementById('feed').prepend(card);
};
</script>
</body>
</html>
