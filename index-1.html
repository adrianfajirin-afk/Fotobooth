<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agis & Ilmi Wedding Guestbook</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f7f4ee;color:#333}
.banner img{width:100%;height:260px;object-fit:cover;display:block}
.header{text-align:center;padding:20px}
.header h1{margin:5px 0}
.date{color:#8a6d3b}
.card{background:#fff;margin:15px;border-radius:18px;padding:15px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.btn{width:100%;padding:14px;border:none;border-radius:999px;margin:6px 0;font-size:16px}
video,img.preview{width:100%;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.post{background:#fff;border-radius:12px;overflow:hidden}
.post img{width:100%;aspect-ratio:1/1;object-fit:cover}
.footer{text-align:center;padding:25px;color:#777}
</style>
</head>
<body>

<div class="banner">
<img src="prewed.jpg" onerror="this.src='https://picsum.photos/1200/500'">
</div>

<div class="header">
<h3>🤍 THE WEDDING OF 🤍</h3>
<h1>Agis & Ilmi</h1>
<p class="date">💍 Kamis, 26 Maret 2026</p>
</div>

<div class="card">
<h3>📸 Virtual Photobooth</h3>
<video id="video" autoplay playsinline></video>
<img id="preview" class="preview" style="display:none">
<button class="btn" onclick="startCam()">📷 Buka Kamera</button>
<button class="btn" onclick="snap()">✨ Ambil Foto</button>
<button class="btn" onclick="addToFeed()">❤️ Tambah ke Feed</button>
</div>

<div class="card">
<h3>🎤 Voice Note</h3>
<button class="btn" onclick="startRec()">🎙️ Mulai Rekam</button>
<button class="btn" onclick="stopRec()">⏹️ Stop Rekam</button>
<div id="status">Belum merekam</div>
<audio id="audio" controls style="width:100%;margin-top:10px"></audio>
</div>

<div class="card">
<h3>📷 Memories Feed</h3>
<div id="feed" class="grid"></div>
</div>

<div class="footer">
Made with ❤️ by Sandi Photobooth
</div>

<script>
let photoData=null;
let recorder,audioChunks=[];

async function startCam(){
 try{
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
  document.getElementById('video').srcObject=stream;
 }catch(e){alert('Kamera tidak tersedia.');}
}

function snap(){
 const v=document.getElementById('video');
 const c=document.createElement('canvas');
 c.width=v.videoWidth||640;
 c.height=v.videoHeight||480;
 c.getContext('2d').drawImage(v,0,0);
 photoData=c.toDataURL('image/jpeg');
 const p=document.getElementById('preview');
 p.src=photoData;
 p.style.display='block';
}

function addToFeed(){
 if(!photoData){alert('Ambil foto dulu');return;}
 const div=document.createElement('div');
 div.className='post';
 div.innerHTML='<img src="'+photoData+'">';
 document.getElementById('feed').prepend(div);
}

async function startRec(){
 const stream=await navigator.mediaDevices.getUserMedia({audio:true});
 recorder=new MediaRecorder(stream);
 audioChunks=[];
 recorder.ondataavailable=e=>audioChunks.push(e.data);
 recorder.onstop=()=>{
   const blob=new Blob(audioChunks,{type:'audio/webm'});
   document.getElementById('audio').src=URL.createObjectURL(blob);
   document.getElementById('status').innerText='Voice note siap diputar';
 };
 recorder.start();
 document.getElementById('status').innerText='Sedang merekam...';
}

function stopRec(){
 if(recorder) recorder.stop();
}
</script>

</body>
</html>
